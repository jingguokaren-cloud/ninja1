<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Kid - 句子重组练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* 章节选择器 */
        .chapter-selector {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .chapter-selector label {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
        }

        .chapter-select {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: white;
            color: #374151;
            cursor: pointer;
            min-width: 280px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .chapter-select:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        .chapter-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.5);
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            height: 12px;
            margin: 20px auto;
            max-width: 400px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 20px;
        }

        .score-display {
            color: white;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .exercise-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .speaker-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .speaker-narrator { background: linear-gradient(135deg, #6b7280, #4b5563); color: white; }
        .speaker-nelson { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .speaker-kenny { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .speaker-mum { background: linear-gradient(135deg, #ec4899, #be185d); color: white; }
        .speaker-grandma { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
        .speaker-charles { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .speaker-sarah { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }

        .chinese-hint {
            color: #6b7280;
            font-size: 0.95em;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #f3f4f6;
            border-radius: 10px;
            border-left: 4px solid #10b981;
        }

        .chinese-hint.hidden {
            visibility: hidden;
            opacity: 0;
        }

        /* 句子控制区域 */
        .sentence-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn-speak-sentence {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .btn-speak-sentence:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .toggle-chinese {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .toggle-chinese:hover { border-color: #9ca3af; }

        .toggle-chinese.hidden-mode {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-color: transparent;
        }

        /* 讲解区域 */
        .explanation-area { margin-top: 20px; display: none; }

        .explanation-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 4px solid;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .phrases-card { border-left-color: #10b981; }

        .explanation-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .phrases-card .explanation-title { color: #059669; }

        .explanation-content {
            color: #374151;
            font-size: 0.95em;
            line-height: 1.7;
        }

        .phrase-item {
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e5e7eb;
        }

        .phrase-item:last-child { margin-bottom: 0; }

        .phrase-en {
            font-weight: 600;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .phrase-cn {
            color: #6b7280;
            font-size: 0.9em;
            margin-top: 4px;
        }

        .speak-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .speak-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.4);
        }

        .speak-icon svg { width: 14px; height: 14px; fill: white; }

        /* 拖拽区域 */
        .drop-zone {
            min-height: 60px;
            border: 3px dashed #d1d5db;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .drop-zone.drag-over {
            border-color: #10b981;
            background: #ecfdf5;
            transform: scale(1.02);
        }

        .drop-zone.correct {
            border-color: #10b981;
            background: #ecfdf5;
            border-style: solid;
        }

        .drop-zone.wrong {
            border-color: #ef4444;
            background: #fef2f2;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
            background: #f8fafc;
            border-radius: 15px;
            min-height: 50px;
        }

        .word {
            padding: 10px 18px;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: #34d399;
            border-radius: 25px;
            cursor: grab;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 4px 15px rgba(15, 32, 39, 0.3);
            position: relative;
        }

        .word:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(15, 32, 39, 0.4);
        }

        .word:active { cursor: grabbing; transform: scale(0.95); }
        .word.dragging { opacity: 0.5; }
        .word.in-zone { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        /* 按钮 */
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-check {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-reset {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(107, 114, 128, 0.4);
        }

        .btn-next {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-prev {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-prev:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-prev:disabled, .btn-nav-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-nav-next {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-nav-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .result-message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        .result-message.correct {
            display: block;
            background: #ecfdf5;
            color: #059669;
        }

        .result-message.wrong {
            display: block;
            background: #fef2f2;
            color: #dc2626;
        }

        .completion-screen {
            display: none;
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .completion-screen h2 {
            font-size: 2em;
            color: #10b981;
            margin-bottom: 20px;
        }

        .completion-screen .emoji { font-size: 4em; margin-bottom: 20px; }

        .completion-screen .final-score {
            font-size: 1.5em;
            color: #374151;
            margin-bottom: 30px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: #34d399;
            padding: 15px 40px;
            font-size: 1.1em;
        }

        /* 课程导航按钮 */
        .chapter-nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn-chapter-nav {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-chapter-nav:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-chapter-nav:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-chapter-prev {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        .btn-chapter-next {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        /* 触摸设备优化 */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.6em; }
            .exercise-card { padding: 20px; }
            .word { padding: 8px 14px; font-size: 0.9em; }
            .buttons { flex-direction: column; }
            .btn { width: 100%; }
            .chapter-selector { flex-direction: column; }
            .chapter-select { min-width: 100%; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🥷 Ninja Kid #1</h1>
            <p>From Nerd To Ninja - 拖拽单词，重组句子</p>

            <div class="chapter-selector">
                <label for="chapterSelect">选择章节：</label>
                <select id="chapterSelect" class="chapter-select" onchange="changeChapter()">
                </select>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="score-display">
                进度: <span id="currentIndex">1</span> / <span id="totalCount">0</span> |
                得分: <span id="score">0</span>
            </div>
        </div>

        <div id="exerciseArea">
            <div class="exercise-card" id="exerciseCard">
                <div class="sentence-controls">
                    <button class="btn-speak-sentence" onclick="speakCurrentSentence()">🔊 听句子</button>
                    <button class="toggle-chinese" id="toggleChinese" onclick="toggleChineseHint()">👁️ 隐藏中文</button>
                    <button class="toggle-chinese" id="toggleWords" onclick="toggleWordPool()">🙈 隐藏单词</button>
                </div>
                <div class="speaker-badge" id="speakerBadge">旁白</div>
                <div class="chinese-hint" id="chineseHint">中文提示</div>

                <div class="drop-zone" id="dropZone">
                    <span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>
                </div>

                <div class="word-pool" id="wordPool"></div>

                <div class="buttons">
                    <button class="btn btn-reset" onclick="resetCurrentExercise()">🔄 重置</button>
                    <button class="btn btn-check" onclick="checkAnswer()">✓ 检查答案</button>
                    <button class="btn btn-next" onclick="goToNextAfterCorrect()" id="btnNext" style="display:none;">下一题 →</button>
                </div>

                <div class="result-message" id="resultMessage"></div>

                <div class="explanation-area" id="explanationArea">
                    <div class="explanation-card phrases-card">
                        <div class="explanation-title"><span>📚</span> 词组讲解</div>
                        <div class="explanation-content" id="phrasesContent"></div>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button class="btn btn-prev" onclick="prevExercise()" id="btnPrev">← 上一句</button>
                    <button class="btn btn-nav-next" onclick="navNextExercise()" id="btnNavNext">下一句 →</button>
                </div>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <div class="emoji">🥷🎉</div>
            <h2>太棒了！本章练习完成！</h2>
            <div class="final-score">
                你的得分: <span id="finalScore">0</span> / <span id="finalTotal">0</span>
            </div>
            <button class="btn btn-restart" onclick="restartExercise()">🔄 重新开始</button>

            <div class="chapter-nav-buttons">
                <button class="btn btn-chapter-nav btn-chapter-prev" id="btnChapterPrev" onclick="goToPrevChapter()">
                    ⬅️ 上一章
                </button>
                <button class="btn btn-chapter-nav btn-chapter-next" id="btnChapterNext" onclick="goToNextChapter()">
                    下一章 ➡️
                </button>
            </div>
        </div>
    </div>

    <script src="ninja_kid_data.js"></script>

    <script>
        let currentChapter = 1;
        let sentences = [];
        let currentIndex = 0;
        let score = 0;
        let draggedWord = null;
        let currentWords = [];

        function initChapterSelector() {
            const select = document.getElementById('chapterSelect');
            select.innerHTML = '';
            availableChapters.forEach(ch => {
                const chapter = chaptersData[ch];
                const option = document.createElement('option');
                option.value = ch;
                option.textContent = `${chapter.title} (${chapter.titleCn})`;
                select.appendChild(option);
            });
            select.value = currentChapter;
        }

        function changeChapter() {
            const select = document.getElementById('chapterSelect');
            currentChapter = parseInt(select.value);
            loadChapter(currentChapter);
        }

        function loadChapter(chapterNum) {
            const chapter = chaptersData[chapterNum];
            sentences = chapter.sentences;
            currentIndex = 0;
            score = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('totalCount').textContent = sentences.length;
            document.getElementById('finalTotal').textContent = sentences.length;
            document.getElementById('exerciseArea').style.display = 'block';
            document.getElementById('completionScreen').style.display = 'none';
            loadExercise(0);
            updateNavButtons();
        }

        function init() {
            initChapterSelector();
            loadChapter(currentChapter);
            setupDragAndDrop();
        }

        function loadExercise(index) {
            const sentence = sentences[index];
            const badge = document.getElementById('speakerBadge');
            badge.textContent = sentence.speaker;
            badge.className = 'speaker-badge ' + sentence.speakerClass;
            document.getElementById('chineseHint').textContent = sentence.chinese;
            document.getElementById('currentIndex').textContent = index + 1;
            const progress = ((index) / sentences.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            currentWords = shuffleArray(tokenizeSentence(sentence.english));
            renderWordPool();

            const dropZone = document.getElementById('dropZone');
            dropZone.innerHTML = '<span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>';
            dropZone.classList.remove('correct', 'wrong');
            document.getElementById('resultMessage').className = 'result-message';
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('explanationArea').style.display = 'none';
        }

        function tokenizeSentence(sentence) {
            const tokens = [];
            const regex = /(\w+[']?\w*|[!?,.])/g;
            let match;
            while ((match = regex.exec(sentence)) !== null) {
                tokens.push(match[0]);
            }
            return tokens;
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function renderWordPool() {
            const pool = document.getElementById('wordPool');
            pool.innerHTML = '';
            currentWords.forEach((word, index) => {
                const wordEl = createWordElement(word, index);
                pool.appendChild(wordEl);
            });
        }

        function createWordElement(word, index) {
            const el = document.createElement('div');
            el.className = 'word';
            el.textContent = word;
            el.draggable = true;
            el.dataset.word = word;
            el.dataset.index = index;
            el.addEventListener('mousedown', (e) => { el.dataset.clickTime = Date.now(); });
            el.addEventListener('mouseup', (e) => {
                const clickTime = parseInt(el.dataset.clickTime) || 0;
                const elapsed = Date.now() - clickTime;
                if (elapsed < 200 && !isPunctuation(word)) { speakWord(word); }
            });
            return el;
        }

        function isPunctuation(str) { return /^[!?,.'"\-;:]+$/.test(str); }

        function speakWord(word) {
            const cleanWord = word.replace(/[^a-zA-Z']/g, '');
            if (!cleanWord) return;
            if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio = null; }
            const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(cleanWord)}&type=1`;
            const audio = new Audio(audioUrl);
            window.currentAudio = audio;
            audio.play().catch(err => console.log('发音加载失败:', err));
        }

        function speakPhrase(text) {
            const cleanText = text.trim();
            if (!cleanText) return;

            // 停止之前的音频
            if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio = null; }
            if (window.audioTimeout) { clearTimeout(window.audioTimeout); }
            if (window.speechSynthesis) { window.speechSynthesis.cancel(); }

            // 多个TTS源，按优先级尝试
            const ttsUrls = [
                `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(cleanText)}&type=1`,
                `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(cleanText)}&type=2`,
            ];

            let currentTtsIndex = 0;
            let resolved = false;

            function tryNextTTS() {
                if (resolved) return;

                // 所有URL都试完了，使用浏览器内置 speechSynthesis 作为最终兜底
                if (currentTtsIndex >= ttsUrls.length) {
                    resolved = true;
                    speakWithBrowserTTS(cleanText);
                    return;
                }

                const url = ttsUrls[currentTtsIndex];
                currentTtsIndex++;

                const audio = new Audio();
                window.currentAudio = audio;

                // 超时计时器（长句子需要更多加载时间）
                const timeout = setTimeout(() => {
                    if (!resolved) {
                        audio.pause();
                        audio.src = '';
                        tryNextTTS();
                    }
                }, 5000);

                audio.onloadeddata = () => {
                    // 检查音频是否有实际内容
                    if (audio.duration > 0.1) {
                        clearTimeout(timeout);
                        resolved = true;
                        audio.play().catch(() => {
                            resolved = false;
                            tryNextTTS();
                        });
                    } else {
                        clearTimeout(timeout);
                        audio.pause();
                        tryNextTTS();
                    }
                };

                audio.onerror = () => {
                    clearTimeout(timeout);
                    tryNextTTS();
                };

                audio.src = url;
                audio.load();
            }

            tryNextTTS();
        }

        // 使用浏览器内置 Web Speech API 作为最终备选
        // 优先选择自然度高的英文声音
        function speakWithBrowserTTS(text) {
            if (!window.speechSynthesis) {
                console.log('浏览器不支持 speechSynthesis');
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;

            // 尝试选择更自然的声音
            const voices = window.speechSynthesis.getVoices();
            // 按优先级排列的高质量声音名称
            const preferredVoices = [
                'Samantha', 'Karen', 'Daniel', 'Moira', 'Tessa',
                'Google US English', 'Google UK English Female', 'Google UK English Male',
                'Microsoft Zira', 'Microsoft David', 'Alex'
            ];
            for (const name of preferredVoices) {
                const voice = voices.find(v => v.name.includes(name));
                if (voice) { utterance.voice = voice; break; }
            }
            // 如果没找到优选声音，找任意英文声音
            if (!utterance.voice) {
                const enVoice = voices.find(v => v.lang.startsWith('en'));
                if (enVoice) utterance.voice = enVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // 确保声音列表已加载（部分浏览器异步加载）
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        }


        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            const wordPool = document.getElementById('wordPool');

            document.addEventListener('dragstart', (e) => {
                if (e.target.classList.contains('word')) { draggedWord = e.target; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
            });
            document.addEventListener('dragend', (e) => {
                if (e.target.classList.contains('word')) { e.target.classList.remove('dragging'); draggedWord = null; }
            });
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault(); dropZone.classList.remove('drag-over');
                if (draggedWord) {
                    const placeholder = dropZone.querySelector('span[style*="italic"]'); if (placeholder) placeholder.remove();
                    draggedWord.classList.add('in-zone'); dropZone.appendChild(draggedWord);
                }
            });
            wordPool.addEventListener('dragover', (e) => { e.preventDefault(); });
            wordPool.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedWord && draggedWord.classList.contains('in-zone')) {
                    draggedWord.classList.remove('in-zone'); wordPool.appendChild(draggedWord);
                    const dz = document.getElementById('dropZone');
                    if (dz.querySelectorAll('.word').length === 0) { dz.innerHTML = '<span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>'; }
                }
            });

            // 点击交互
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('word')) {
                    const word = e.target;
                    const dz = document.getElementById('dropZone');
                    const wp = document.getElementById('wordPool');
                    if (word.classList.contains('in-zone')) {
                        word.classList.remove('in-zone'); wp.appendChild(word);
                        if (dz.querySelectorAll('.word').length === 0) { dz.innerHTML = '<span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>'; }
                    } else {
                        const placeholder = dz.querySelector('span[style*="italic"]'); if (placeholder) placeholder.remove();
                        word.classList.add('in-zone'); dz.appendChild(word);
                    }
                }
            });
        }

        function checkAnswer() {
            const dropZone = document.getElementById('dropZone');
            const words = dropZone.querySelectorAll('.word');
            const userTokens = Array.from(words).map(w => w.dataset.word);
            const correctTokens = tokenizeSentence(sentences[currentIndex].english);
            const resultMessage = document.getElementById('resultMessage');
            const isCorrect = userTokens.length === correctTokens.length &&
                userTokens.every((token, i) => token === correctTokens[i]);
            if (isCorrect) {
                dropZone.classList.add('correct'); dropZone.classList.remove('wrong');
                resultMessage.className = 'result-message correct';
                resultMessage.textContent = '✓ 正确！太棒了！🥷';
                score++; document.getElementById('score').textContent = score;
                document.getElementById('btnNext').style.display = 'inline-block';
                showExplanation();
            } else {
                dropZone.classList.add('wrong'); dropZone.classList.remove('correct');
                resultMessage.className = 'result-message wrong';
                resultMessage.textContent = '✗ 再试一次！正确答案: ' + correctTokens.join(' ');
            }
        }

        function resetCurrentExercise() { loadExercise(currentIndex); }

        function showExplanation() {
            const sentence = sentences[currentIndex];
            const explanationArea = document.getElementById('explanationArea');
            const phrasesContent = document.getElementById('phrasesContent');
            if (sentence.phrases && sentence.phrases.length > 0) {
                explanationArea.style.display = 'block';
                let phrasesHtml = '';
                sentence.phrases.forEach(phrase => {
                    phrasesHtml += `
                        <div class="phrase-item">
                            <div class="phrase-en">
                                <span class="speak-icon" onclick="speakPhrase('${phrase.en.replace(/'/g, "\\'")}')"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></span>
                                ${phrase.en}
                            </div>
                            <div class="phrase-cn">${phrase.cn}</div>
                        </div>`;
                });
                phrasesContent.innerHTML = phrasesHtml;
            } else {
                explanationArea.style.display = 'none';
            }
        }

        function speakCurrentSentence() {
            // 播放本地 Azure TTS MP3 文件
            if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio = null; }
            if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
            const audioPath = `audio/ch${currentChapter}/s${currentIndex + 1}.mp3`;
            const audio = new Audio(audioPath);
            window.currentAudio = audio;
            audio.play().catch(err => {
                console.log('本地 MP3 播放失败，回退到在线 TTS:', err);
                speakPhrase(sentences[currentIndex].english);
            });
        }

        let chineseHidden = false;
        function toggleChineseHint() {
            const hint = document.getElementById('chineseHint');
            const btn = document.getElementById('toggleChinese');
            chineseHidden = !chineseHidden;
            if (chineseHidden) { hint.classList.add('hidden'); btn.classList.add('hidden-mode'); btn.innerHTML = '👁️ 显示中文'; }
            else { hint.classList.remove('hidden'); btn.classList.remove('hidden-mode'); btn.innerHTML = '👁️ 隐藏中文'; }
        }

        let wordsHidden = false;
        function toggleWordPool() {
            const pool = document.getElementById('wordPool');
            const btn = document.getElementById('toggleWords');
            wordsHidden = !wordsHidden;
            if (wordsHidden) { pool.style.visibility = 'hidden'; btn.classList.add('hidden-mode'); btn.innerHTML = '🐵 显示单词'; }
            else { pool.style.visibility = 'visible'; btn.classList.remove('hidden-mode'); btn.innerHTML = '🙈 隐藏单词'; }
        }

        function goToNextAfterCorrect() {
            currentIndex++;
            if (currentIndex >= sentences.length) { showCompletion(); }
            else { loadExercise(currentIndex); updateNavButtons(); }
        }

        function prevExercise() {
            if (currentIndex > 0) { currentIndex--; loadExercise(currentIndex); updateNavButtons(); }
        }

        function navNextExercise() {
            if (currentIndex < sentences.length - 1) { currentIndex++; loadExercise(currentIndex); updateNavButtons(); }
        }

        function updateNavButtons() {
            document.getElementById('btnPrev').disabled = currentIndex === 0;
            document.getElementById('btnNavNext').disabled = currentIndex === sentences.length - 1;
        }

        function showCompletion() {
            document.getElementById('exerciseArea').style.display = 'none';
            document.getElementById('completionScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('progressFill').style.width = '100%';
            updateChapterNavButtons();
        }

        function restartExercise() { loadChapter(currentChapter); }

        function goToPrevChapter() {
            const idx = availableChapters.indexOf(currentChapter);
            if (idx > 0) {
                currentChapter = availableChapters[idx - 1];
                document.getElementById('chapterSelect').value = currentChapter;
                loadChapter(currentChapter);
            }
        }

        function goToNextChapter() {
            const idx = availableChapters.indexOf(currentChapter);
            if (idx < availableChapters.length - 1) {
                currentChapter = availableChapters[idx + 1];
                document.getElementById('chapterSelect').value = currentChapter;
                loadChapter(currentChapter);
            }
        }

        function updateChapterNavButtons() {
            const idx = availableChapters.indexOf(currentChapter);
            const btnPrev = document.getElementById('btnChapterPrev');
            const btnNext = document.getElementById('btnChapterNext');
            if (btnPrev) {
                btnPrev.disabled = idx === 0;
                if (idx > 0) { const prev = chaptersData[availableChapters[idx - 1]]; btnPrev.innerHTML = `⬅️ ${prev.title} (${prev.titleCn})`; }
                else { btnPrev.innerHTML = '⬅️ 上一章'; }
            }
            if (btnNext) {
                btnNext.disabled = idx === availableChapters.length - 1;
                if (idx < availableChapters.length - 1) { const next = chaptersData[availableChapters[idx + 1]]; btnNext.innerHTML = `${next.title} (${next.titleCn}) ➡️`; }
                else { btnNext.innerHTML = '下一章 ➡️'; }
            }
        }

        init();
    </script>
